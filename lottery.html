
 <!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>森林能量灌注｜守護森林安全計劃</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans CJK TC', sans-serif;
            background: #87CEEB;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background-image: url('EHS Month Activity.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* ========== SCREEN: 待機畫面 ========== */
        #attractScreen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            opacity: 1;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        #attractScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .cta-section {
            position: absolute;
            bottom: 120px;
            text-align: center;
            width: 100%;
        }

        .cta-text {
            font-size: 20px;
            color: #fef294;
            font-weight: 600;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            animation: pulse-text 2s ease-in-out infinite;
        }

        .cta-subtitle {
            font-size: 12px;
            color: #fef294;
            font-weight: 400;
            margin-bottom: 15px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            opacity: 0.9;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        .wooden-btn {
            display: inline-block;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #8B5A2B 0%, #A0683A 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 8px 20px rgba(139, 90, 43, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 215, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        .wooden-btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 12px 30px rgba(139, 90, 43, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                0 0 20px rgba(255, 215, 0, 0.4);
        }

        .wooden-btn:active {
            transform: translateY(-1px);
        }

        .bottom-title {
            position: absolute;
            bottom: 30px;
            text-align: center;
            width: 100%;
            font-size: 14px;
            color: #fef294;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .bottom-subtitle {
            position: absolute;
            bottom: 12px;
            text-align: center;
            width: 100%;
            font-size: 11px;
            color: #fef294;
            font-weight: 400;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            opacity: 0.85;
        }

        /* ========== SCREEN: 灌注動畫 ========== */
        #infusionScreen {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            opacity: 1;
            transition: opacity 0.5s ease;
            z-index: 20;
            padding-top: 40px;
        }

        #infusionScreen.visible {
            display: flex;
        }

        .energy-bar-container {
            width: 280px;
            height: 50px;
            background: linear-gradient(135deg, rgba(139, 90, 43, 0.8), rgba(107, 68, 35, 0.8));
            border: 3px solid #8B5A2B;
            border-radius: 30px;
            padding: 8px;
            margin: 40px auto;
            position: relative;
            box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.3), 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .energy-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4CAF50 0%, #8BC34A 50%, #CDDC39 100%);
            border-radius: 25px;
            transition: width 0.1s ease;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.6);
            position: relative;
            overflow: hidden;
        }

        .energy-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: bar-shimmer 1s infinite;
        }

        @keyframes bar-shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .energy-percentage {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        /* 互動球體 */
        .infusion-sphere-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
            flex: 1;
        }

        .infusion-sphere {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 35% 35%, #FFD700, #FFA500);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 40px rgba(255, 165, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            position: relative;
        }

        .infusion-sphere:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(255, 165, 0, 0.5);
        }

        .infusion-sphere.pressing {
            transform: scale(0.95);
            box-shadow: 0 5px 20px rgba(255, 165, 0, 0.6);
        }

        .sphere-inner-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), transparent);
            pointer-events: none;
        }

        .sphere-text {
            font-size: 20px;
            color: #0c0c0c;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .sphere-subtitle {
            font-size: 12px;
            color: #fef294;
            font-weight: 400;
            margin-top: 30px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            opacity: 0.9;
        }

        @keyframes character-appear {
            0% {
                opacity: 0;
                transform: scale(0.5) translateY(20px);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: scale(0.8) translateY(-40px);
            }
        }

        .character-bubble {
            position: absolute;
            width: 200px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            border: 2px solid #8BC34A;
            text-align: center;
            font-size: 14px;
            color: #2d7d32;
            font-weight: 600;
            animation: character-appear 3s ease-in-out;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            pointer-events: none;
        }

        /* ========== SCREEN: Reveal 動畫 ========== */
        #revealScreen {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            opacity: 1;
            transition: opacity 0.5s ease;
            z-index: 30;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.1), transparent);
        }

        #revealScreen.visible {
            display: flex;
        }

        .prize-card {
            width: 300px;
            padding: 50px 40px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(200, 230, 201, 0.4));
            border-radius: 20px;
            border: 3px solid #8BC34A;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.25);
            animation: card-float 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        @keyframes card-float {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .prize-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            animation: shine-card 2s infinite;
        }

        @keyframes shine-card {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }

        .prize-icon {
            font-size: 70px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .prize-title {
            font-size: 28px;
            font-weight: 700;
            color: #2d7d32;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .prize-description {
            font-size: 14px;
            color: #558b2f;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .prize-level-badge {
            display: inline-block;
            padding: 8px 16px;
            background: #FFD700;
            color: #333;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            position: relative;
            z-index: 1;
            margin: 10px 5px;
        }

        .prize-level-badge.gold {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #fff;
        }

        .prize-level-badge.rainbow {
            background: linear-gradient(90deg, #FF6B6B, #FFA500, #FFD700, #6BCF7F, #4ECDC4);
            color: #fff;
            animation: rainbow-pulse 1.5s ease-in-out infinite;
        }

        @keyframes rainbow-pulse {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(255, 150, 0, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(255, 150, 0, 0.8));
            }
        }

        .particle {
            position: fixed;
            pointer-events: none;
            will-change: transform;
        }

        @keyframes particle-burst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        .reset-button {
            position: fixed;
            bottom: 80px;
            right: 40px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #8B5A2B, #A0683A);
            color: #fff;
            border: 2px solid rgba(255, 215, 0, 0.6);
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .reset-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 90, 43, 0.3);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 待機畫面 -->
        <div id="attractScreen">
            <div class="cta-section">
                <div class="cta-text">點擊開始灌注守護能量</div>
                <div class="cta-subtitle">Click to start infusing protective energy</div>
                <button class="wooden-btn" id="startBtn">開始灌注</button>
            </div>

            <div class="bottom-title">守護森林安全計劃</div>
            <div class="bottom-subtitle">Forest Protection Safety Plan</div>
        </div>

        <!-- 灌注動畫畫面 -->
        <div id="infusionScreen">
            <div class="energy-bar-container">
                <div class="energy-bar-fill" id="energyBarFill"></div>
                <div class="energy-percentage" id="energyPercentage">0%</div>
            </div>

            <div class="infusion-sphere-container">
                <div class="infusion-sphere" id="infusionSphere">
                    <div class="sphere-inner-glow"></div>
                    <div class="sphere-text">長按灌注</div>
                </div>
                <div class="sphere-subtitle">Hold to infuse</div>
            </div>

            <div id="characterBubble"></div>
        </div>

        <!-- Reveal 動畫畫面 -->
        <div id="revealScreen">
            <div class="prize-card">
                <div class="prize-icon" id="prizeIcon">🎁</div>
                <div class="prize-title" id="prizeTitle">獲得獎品</div>
                <div class="prize-description" id="prizeDescription">感謝您的守護</div>
                <div id="prizeLevel"></div>
            </div>
        </div>

        <button class="reset-button" id="resetBtn" style="display: none;">← 返回首頁</button>
    </div>

    <script>
        const CONFIG = {
            ENERGY_INCREASE_RATE: 1.5,
            INFUSION_DURATION: 7000,
            ANIMATION_DURATION: 3000,
            PARTICLE_COUNT: 40
        };

        const PRIZES = [
            { icon: '🌟', title: '神秘禮盒', desc: '工安禮品套組', level: 'normal', color: 'green' },
            { icon: '🎊', title: '森林禮物', desc: '特製森林杯墊', level: 'normal', color: 'green' },
            { icon: '🏆', title: '黃金禮券', desc: '200元購物禮券', level: 'gold', color: 'gold' },
            { icon: '✨', title: '至尊大獎', desc: '1000元購物禮券', level: 'rainbow', color: 'rainbow' },
            { icon: '🎯', title: '工安勳章', desc: '專屬榮譽證書', level: 'gold', color: 'gold' }
        ];

        let gameState = {
            currentEnergy: 0,
            isInfusing: false,
            currentScreen: 'attract',
            lastBubbleMilestone: 0,
            bubbleTimeout: null
        };

        const startBtn = document.getElementById('startBtn');
        const infusionSphere = document.getElementById('infusionSphere');
        const resetBtn = document.getElementById('resetBtn');
        const energyBarFill = document.getElementById('energyBarFill');
        const energyPercentage = document.getElementById('energyPercentage');

        const attractScreen = document.getElementById('attractScreen');
        const infusionScreen = document.getElementById('infusionScreen');
        const revealScreen = document.getElementById('revealScreen');

        startBtn.addEventListener('click', startInfusion);
        infusionSphere.addEventListener('mousedown', startEnergyIncrease);
        infusionSphere.addEventListener('mouseup', stopEnergyIncrease);
        infusionSphere.addEventListener('mouseleave', stopEnergyIncrease);
        infusionSphere.addEventListener('touchstart', startEnergyIncrease, { passive: false });
        infusionSphere.addEventListener('touchend', stopEnergyIncrease);
        infusionSphere.addEventListener('touchcancel', stopEnergyIncrease);
        resetBtn.addEventListener('click', resetGame);

        function startInfusion() {
            gameState.currentScreen = 'infusion';
            gameState.currentEnergy = 0;
            gameState.lastBubbleMilestone = 0;
            attractScreen.classList.add('hidden');
            infusionScreen.classList.add('visible');
            resetBtn.style.display = 'none';
            updateEnergyDisplay();
        }

        function startEnergyIncrease(e) {
            if (e && e.cancelable) e.preventDefault();
            if (gameState.isInfusing || gameState.currentEnergy >= 100) return;
            gameState.isInfusing = true;
            infusionSphere.classList.add('pressing');

            const infusionInterval = setInterval(() => {
                if (!gameState.isInfusing) {
                    clearInterval(infusionInterval);
                    return;
                }
                gameState.currentEnergy = Math.min(100, gameState.currentEnergy + CONFIG.ENERGY_INCREASE_RATE);
                updateEnergyDisplay();

                // 每跨過 25% 里程碑就跳一次角色提示（修正：原本用 %25 因步進 1.5 幾乎永不觸發）
                const milestone = Math.floor(gameState.currentEnergy / 25) * 25;
                if (milestone > gameState.lastBubbleMilestone && milestone < 100) {
                    gameState.lastBubbleMilestone = milestone;
                    showCharacterBubble();
                }

                if (gameState.currentEnergy >= 100) {
                    gameState.isInfusing = false;
                    infusionSphere.classList.remove('pressing');
                    clearInterval(infusionInterval);
                    triggerReveal();
                }
            }, 50);
        }

        function stopEnergyIncrease(e) {
            if (e && e.cancelable) e.preventDefault();
            gameState.isInfusing = false;
            infusionSphere.classList.remove('pressing');
        }

        function updateEnergyDisplay() {
            energyBarFill.style.width = gameState.currentEnergy + '%';
            energyPercentage.textContent = Math.floor(gameState.currentEnergy) + '%';
        }

        const CHARACTERS = [
            { name: '消防熊', msg: '森林能量正在恢復！', emoji: '🔥' },
            { name: '工安熊', msg: '偵測到守護能量提升！', emoji: '🛟' },
            { name: '醫護熊', msg: '生命之樹開始甦醒了！', emoji: '⚕️' },
            { name: '偵探熊', msg: '發現強大的保護能量！', emoji: '🔍' }
        ];

        function showCharacterBubble() {
            const character = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];
            const bubble = document.getElementById('characterBubble');
            bubble.innerHTML = `
                <div class="character-bubble">
                    <div style="font-size: 40px; margin-bottom: 10px;">${character.emoji}</div>
                    <div>${character.msg}</div>
                </div>
            `;
            // 修正：清掉上一顆泡泡的 timeout，避免新泡泡被提前清空
            if (gameState.bubbleTimeout) clearTimeout(gameState.bubbleTimeout);
            gameState.bubbleTimeout = setTimeout(() => {
                bubble.innerHTML = '';
                gameState.bubbleTimeout = null;
            }, 3000);
        }

        function triggerReveal() {
            infusionScreen.classList.remove('visible');
            setTimeout(() => {
                revealScreen.classList.add('visible');
                playRevealAnimation();
            }, 500);
        }

        //隨機抽取獎品並顯示動畫//
        function playRevealAnimation() {
            const prize = PRIZES[Math.floor(Math.random() * PRIZES.length)];
            document.getElementById('prizeIcon').textContent = prize.icon;
            document.getElementById('prizeTitle').textContent = prize.title;
            document.getElementById('prizeDescription').textContent = prize.desc;

            let badgeClass = '';
            let badgeText = '';
            if (prize.level === 'normal') {
                badgeClass = '';
                badgeText = '普通獎';
            } else if (prize.level === 'gold') {
                badgeClass = 'gold';
                badgeText = '金級獎';
            } else if (prize.level === 'rainbow') {
                badgeClass = 'rainbow';
                badgeText = '至尊大獎 🌈';
            }
            document.getElementById('prizeLevel').innerHTML = `<div class="prize-level-badge ${badgeClass}">${badgeText}</div>`;
            burstParticles(CONFIG.PARTICLE_COUNT);
            resetBtn.style.display = 'block';
        }

        function burstParticles(count) {
            const container = document.querySelector('.app-container');
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const angle = (i / count) * Math.PI * 2;
                const velocity = 5 + Math.random() * 8;
                const tx = Math.cos(angle) * velocity * 50;
                const ty = Math.sin(angle) * velocity * 50;
                particle.textContent = '✨';
                particle.style.left = '50%';
                particle.style.top = '50%';
                particle.style.fontSize = '20px';
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.animation = `particle-burst 1s ease-out forwards`;
                container.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        function resetGame() {
            gameState.currentScreen = 'attract';
            gameState.currentEnergy = 0;
            gameState.isInfusing = false;
            gameState.lastBubbleMilestone = 0;
            if (gameState.bubbleTimeout) { clearTimeout(gameState.bubbleTimeout); gameState.bubbleTimeout = null; }
            document.getElementById('characterBubble').innerHTML = '';
            infusionSphere.classList.remove('pressing');
            revealScreen.classList.remove('visible');
            infusionScreen.classList.remove('visible');
            attractScreen.classList.remove('hidden');
            resetBtn.style.display = 'none';
            updateEnergyDisplay();
        }

        updateEnergyDisplay();
    
    </script>
</body>
</html>
